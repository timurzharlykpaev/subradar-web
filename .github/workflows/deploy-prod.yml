name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm install
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.subradar.ai
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Prepare standalone
        run: |
          cp -r .next/static .next/standalone/.next/static || true
          cp -r public .next/standalone/public || true

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 46.101.197.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next/standalone/"
          target: /opt/subradar/web-prod-new/
          strip_components: 2

      - name: Restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.101.197.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rsync -a /opt/subradar/web-prod-new/ /opt/subradar/web-prod-app/
            cd /opt/subradar/web-prod-app
            PORT=3200 pm2 restart subradar-web-prod 2>/dev/null || PORT=3200 pm2 start server.js --name subradar-web-prod
            pm2 save
            echo "✅ deployed to https://app.subradar.ai"
